<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Book</title>
</head>
<body>
<h1>Add Book</h1>
<form th:action="@{/books/save}" th:object="${book}" method="post">
  <label>ID:</label>
  <input type="number" th:field="*{id}"><br><br>
  <label>Title:</label>
  <input type="text" th:field="*{title}"><br><br>
  <label>Author:</label>
  <input type="text" th:field="*{author}"><br><br>
  <button type="submit">Save</button>
</form>
</body>
</html>
